name: Build iOS

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.3.app/Contents/Developer

      - name: Show available destinations
        run: |
          xcodebuild -project MobileDevelopmentIOS/MobileDevelopmentIOS.xcodeproj \
            -scheme MobileDevelopmentIOS \
            -showdestinations 2>/dev/null | head -40

      - name: Resolve packages
        run: |
          xcodebuild -resolvePackageDependencies \
            -project MobileDevelopmentIOS/MobileDevelopmentIOS.xcodeproj \
            -scheme MobileDevelopmentIOS

      - name: Build
        run: |
          xcodebuild build \
            -project MobileDevelopmentIOS/MobileDevelopmentIOS.xcodeproj \
            -scheme MobileDevelopmentIOS \
            -destination 'generic/platform=iOS Simulator' \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            2>&1 | tee build.log | xcpretty; exit ${PIPESTATUS[0]}

      - name: Show full errors on failure
        if: failure()
        run: grep -A 5 -E '(error:|warning:.*error|failed)' build.log || tail -100 build.log
