name: Build iOS

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Resolve packages
        run: |
          xcodebuild -resolvePackageDependencies \
            -project MobileDevelopmentIOS/MobileDevelopmentIOS.xcodeproj \
            -scheme MobileDevelopmentIOS

      - name: Build
        run: |
          xcodebuild build \
            -project MobileDevelopmentIOS/MobileDevelopmentIOS.xcodeproj \
            -scheme MobileDevelopmentIOS \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=18.5' \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            2>&1 | tee build.log | xcpretty; exit ${PIPESTATUS[0]}

      - name: Show full errors on failure
        if: failure()
        run: grep -A 5 -E '(error:|warning:.*error|failed)' build.log || tail -100 build.log
